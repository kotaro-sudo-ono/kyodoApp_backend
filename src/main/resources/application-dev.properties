# ローカル開発環境設定
spring.datasource.url=jdbc:mysql://localhost:13306/kyudo_app
spring.datasource.username=${LOCAL_MYSQL_USER:kyudo_user}
spring.datasource.password=${LOCAL_MYSQL_PASSWORD:secret}

# 開発時のログレベル
logging.level.com.example.kyudo_app=DEBUG
logging.level.org.springframework.web=DEBUG

# SQL ロギング
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
